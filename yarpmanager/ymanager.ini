# Path to the folder which contains application description files
apppath = "/workspace/project/yarpmanager/applications"
load_subfolders = yes

# Path to the folder which contains module description files
modpath = "/workspace/project/yarpmanager/modules"

# Path to the folder which contains resource description files
respath = "/workspace/project/yarpmanager/resources"

# Fault tolerance
watchdog = no
module_failure = prompt
connection_failure = prompt

# Automatically connect application-defined ports after launch.
# The generic tool apps have no fixed connections; the BallBalance demos do.
auto_connect = yes

# Appearance
color_theme = dark
external_editor = /usr/bin/editor
